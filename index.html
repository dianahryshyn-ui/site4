<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dental Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-blue: #d8ecff;
    --deep-blue: #1f6fb2;
    --accent-blue: #63b3ff;
    --white: #ffffff;
    --text-dark: #17324d;
    --shadow: 0 10px 20px rgba(31, 111, 178, 0.16);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Lato', sans-serif;
    background: linear-gradient(180deg, #f2f8ff 0%, #eaf5ff 100%);
    color: var(--text-dark);
    padding-bottom: 100px;
    overflow-x: hidden;
}

header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    z-index: 100;
    box-shadow: 0 2px 10px rgba(31,111,178,0.08);
    display: flex;
    justify-content: center;
    align-items: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--deep-blue);
}

.container {
    padding: 15px;
    max-width: 600px;
    margin: 0 auto;
}

.selected-service {
    background: var(--white);
    color: var(--deep-blue);
    border: 1px solid rgba(31,111,178,0.14);
    box-shadow: var(--shadow);
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 15px;
    text-align: center;
    font-weight: 700;
}

.product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.product-card {
    background: var(--white);
    border-radius: 20px;
    padding: 15px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
    border: 2px solid transparent;
}

.product-card:active {
    transform: scale(0.97);
}

.product-card.selected {
    border-color: var(--accent-blue);
}

.img-container {
    width: 100%;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 12px;
}

.product-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 14px;
}

.add-btn {
    background: var(--primary-blue);
    color: var(--deep-blue);
    border: none;
    padding: 9px 15px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.82rem;
    width: 100%;
    cursor: pointer;
}

.product-card.selected .add-btn {
    background: var(--deep-blue);
    color: var(--white);
}

.action-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 500px;
    background: var(--deep-blue);
    color: white;
    padding: 15px 25px;
    border-radius: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 10px 30px rgba(31,111,178,0.35);
    z-index: 1000;
    cursor: pointer;
}

.cart-info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.cart-count {
    background: white;
    color: var(--deep-blue);
    width: 25px;
    height: 25px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

.action-text {
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 0.9rem;
}

.flying-img {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    border-radius: 50%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: top 0.8s cubic-bezier(0.5,0,0.5,1),
                left 0.8s cubic-bezier(0.5,0,0.5,1),
                width 0.8s ease,
                height 0.8s ease,
                opacity 0.8s ease;
}

@keyframes bump {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
    100% { transform: translateX(-50%) scale(1); }
}

.bump-anim {
    animation: bump 0.3s ease;
}

.modal-overlay,
.service-overlay {
    position: fixed;
    inset: 0;
    background: rgba(242,248,255,0.98);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
    padding: 20px;
}

.modal-overlay.active,
.service-overlay.active {
    opacity: 1;
    visibility: visible;
}

.service-content {
    max-width: 420px;
    width: 100%;
    display: grid;
    gap: 12px;
}

.service-btn {
    width: 100%;
    border: none;
    border-radius: 22px;
    background: var(--white);
    color: var(--deep-blue);
    font-size: 1rem;
    font-weight: 700;
    padding: 18px;
    cursor: pointer;
    box-shadow: var(--shadow);
}

.modal-content {
    text-align: center;
    padding: 30px;
    max-width: 420px;
    width: 100%;
    overflow: hidden;
}

.success-icon {
    width: 90px;
    height: 90px;
    background: var(--deep-blue);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 35px;
    color: white;
    font-size: 44px;
    box-shadow: 0 10px 20px rgba(31,111,178,0.3);
}

.car-container {
    position: relative;
    height: 170px;
    width: 100%;
}

.car-svg {
    position: absolute;
    left: -260px;
    width: 240px;
    height: auto;
    color: var(--deep-blue);
}

@keyframes drive {
    0% { left: -260px; }
    40% { left: 50%; transform: translateX(-50%); }
    65% { left: 50%; transform: translateX(-50%); }
    100% { left: 120%; }
}

.modal-overlay.active .car-svg {
    animation: drive 3s ease-in-out 0.3s forwards;
}
</style>
</head>

<body>

<header>
    <h1>Dental Selection</h1>
</header>

<div class="container">
    <div class="selected-service" id="selectedServiceText">Choose a service</div>
    <div class="product-grid" id="productGrid"></div>
</div>

<div class="action-bar" id="actionBar" onclick="openInsight()">
    <div class="cart-info">
        <div class="cart-count" id="cartCount">0</div>
        <span>Selected</span>
    </div>
    <div class="action-text">Continue</div>
</div>

<div class="service-overlay active" id="serviceModal">
    <div class="service-content">
        <button class="service-btn" onclick="selectService('Top and Bottom Braces')">Top and Bottom Braces</button>
        <button class="service-btn" onclick="selectService('Teeth cleaning')">Teeth cleaning</button>
        <button class="service-btn" onclick="selectService('Consultation')">Consultation</button>
    </div>
</div>

<div class="modal-overlay" id="insightModal" onclick="resetApp()">
    <div class="modal-content">
        <div class="success-icon">✓</div>

        <div class="car-container">
            <svg class="car-svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 13V7H20C20.5523 7 21 7.44772 21 8V13H19ZM17 13V6H12V13H17ZM10 13V6H4V13H10ZM10 4H18.5858L21.5858 7H23V14H22C22 15.6569 20.6569 17 19 17C17.3431 17 16 15.6569 16 14H8C8 15.6569 6.65685 17 5 17C3.34315 17 2 15.6569 2 14H1V4C1 2.89543 1.89543 2 3 2H10V4ZM5 15C5.55228 15 6 14.5523 6 14C6 13.4477 5.55228 13 5 13C4.44772 13 4 13.4477 4 14C4 14.5523 4.44772 15 5 15ZM19 15C19.5523 15 20 14.5523 20 14C20 13.4477 19.5523 13 19 13C18.4477 13 18 13.4477 18 14C18 14.5523 18.4477 15 19 15Z"/>
            </svg>
        </div>
    </div>
</div>

<script>
const products = [
    { id: 1, img: "https://www.image2url.com/r2/default/images/1777130181737-23a704e9-019a-4f66-9a9d-725ce7b0f5bd.png" },
    { id: 2, img: "https://i.ibb.co/0jCLDrXK/IMG-2102.jpg" },
    { id: 3, img: "https://i.ibb.co/B5YRrq5r/IMG-2103.jpg" },
    { id: 4, img: "https://i.ibb.co/bMwqsTdL/IMG-2104.jpg" },
    { id: 5, img: "https://i.ibb.co/k6X13r2k/IMG-2106.png" },
    { id: 6, img: "https://i.ibb.co/DPL4Krbd/IMG-2107.png" }
];


let selectedService = "";
let cart = [];

const grid = document.getElementById("productGrid");
const cartCountEl = document.getElementById("cartCount");
const actionBar = document.getElementById("actionBar");
const selectedServiceText = document.getElementById("selectedServiceText");
const serviceModal = document.getElementById("serviceModal");

function selectService(service) {
    selectedService = service;
    selectedServiceText.textContent = service;
    serviceModal.classList.remove("active");
}

function renderProducts() {
    grid.innerHTML = products.map(product => `
        <div class="product-card" id="card-${product.id}" onclick="addToCart(event, ${product.id}, '${product.img}')">
            <div class="img-container">
                <img src="${product.img}" alt="Option ${product.id}" class="product-img" id="img-${product.id}">
            </div>
            <button class="add-btn" id="btn-${product.id}">Select</button>
        </div>
    `).join("");
}

function addToCart(e, id, imgUrl) {
    e.stopPropagation();

    if (!selectedService) {
        serviceModal.classList.add("active");
        return;
    }

    if (cart.includes(id)) {
        cart = cart.filter(item => item !== id);
        document.getElementById(`card-${id}`).classList.remove("selected");
        document.getElementById(`btn-${id}`).textContent = "Select";
        updateCartUI();
        return;
    }

    cart.push(id);
    document.getElementById(`card-${id}`).classList.add("selected");
    document.getElementById(`btn-${id}`).textContent = "Selected";

    const sourceImg = document.getElementById(`img-${id}`);
    const rectStart = sourceImg.getBoundingClientRect();
    const rectEnd = cartCountEl.getBoundingClientRect();

    const flyer = document.createElement("img");
    flyer.src = imgUrl;
    flyer.classList.add("flying-img");

    flyer.style.top = `${rectStart.top}px`;
    flyer.style.left = `${rectStart.left}px`;
    flyer.style.width = `${rectStart.width}px`;
    flyer.style.height = `${rectStart.height}px`;

    document.body.appendChild(flyer);
    flyer.offsetHeight;

    flyer.style.top = `${rectEnd.top}px`;
    flyer.style.left = `${rectEnd.left}px`;
    flyer.style.width = "25px";
    flyer.style.height = "25px";
    flyer.style.opacity = "0.5";

    setTimeout(() => {
        flyer.remove();
        updateCartUI();
        animateActionBar();
    }, 800);
}

function updateCartUI() {
    cartCountEl.textContent = cart.length;
}

function animateActionBar() {
    actionBar.classList.remove("bump-anim");
    void actionBar.offsetWidth;
    actionBar.classList.add("bump-anim");
}

function openInsight() {
    if (!selectedService) {
        serviceModal.classList.add("active");
        return;
    }

    if (cart.length === 0) {
        alert("Please make a selection first.");
        return;
    }

    document.getElementById("insightModal").classList.add("active");
}

function resetApp() {
    const modal = document.getElementById("insightModal");
    modal.classList.remove("active");

    setTimeout(() => {
        cart = [];
        updateCartUI();

        document.querySelectorAll(".product-card").forEach(card => {
            card.classList.remove("selected");
        });

        document.querySelectorAll(".add-btn").forEach(btn => {
            btn.textContent = "Select";
        });
    }, 300);
}

renderProducts();
</script>

</body>
</html>
